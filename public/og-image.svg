<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Abstract grid/lines -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#FBF850" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#FBF850" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#FBF850" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#FBF850" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#FBF850" stroke-width="1"/>
    
    <line x1="200" y1="0" x2="200" y2="630" stroke="#FBF850" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#FBF850" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#FBF850" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#FBF850" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#FBF850" stroke-width="1"/>
  </g>

  <!-- Logo/Text -->
  <text x="600" y="300" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#FBF850" text-anchor="middle">WAMI</text>
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" letter-spacing="10">VIBE CODING</text>
  
  <!-- Accent line -->
  <rect x="500" y="430" width="200" height="4" fill="#FBF850"/>
</svg>

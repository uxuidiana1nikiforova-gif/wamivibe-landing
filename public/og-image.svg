<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>
  
  <!-- Subtle Grid Background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />
  
  <!-- Content Container (Mimicking the Hero Section) -->
  <g transform="translate(100, 100)">
    <!-- Navigation Bar Mockup -->
    <g transform="translate(0, -40)">
      <text font-family="system-ui, sans-serif" font-size="24" font-weight="900" fill="#FBF850">WAMI</text>
      <g transform="translate(800, 0)">
        <rect x="0" y="-15" width="100" height="30" rx="15" fill="#FBF850" />
        <text x="50" y="6" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#000000" text-anchor="middle">CONTACT</text>
      </g>
    </g>

    <!-- Hero Text -->
    <g transform="translate(0, 120)">
      <text font-family="system-ui, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
        VIBE CODING <tspan fill="#FBF850">WITH</tspan>
      </text>
      <text y="90" font-family="system-ui, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
        SENIOR OVERSIGHT
      </text>
      
      <text y="160" font-family="system-ui, sans-serif" font-size="24" font-weight="400" fill="#888888" opacity="0.8">
        High-speed development with expert quality control.
      </text>
    </g>

    <!-- Visual Element (Mimicking the Team Foundation Visual) -->
    <g transform="translate(750, 250)">
      <!-- Central Core -->
      <circle r="60" fill="#111111" stroke="#FBF850" stroke-width="2" />
      <text y="5" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#FBF850" text-anchor="middle">CORE</text>
      
      <!-- Support Nodes -->
      <g transform="rotate(0)">
        <line x1="60" y1="0" x2="120" y2="0" stroke="#FBF850" stroke-width="1" opacity="0.3" />
        <rect x="120" y="-15" width="100" height="30" rx="15" fill="#111111" stroke="#FBF850" stroke-width="1" />
        <text x="170" y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">ANALYSTS</text>
      </g>
      <g transform="rotate(72)">
        <line x1="60" y1="0" x2="120" y2="0" stroke="#FBF850" stroke-width="1" opacity="0.3" />
        <rect x="120" y="-15" width="100" height="30" rx="15" fill="#111111" stroke="#FBF850" stroke-width="1" />
        <text x="170" y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" transform="rotate(-72, 170, 0)">DESIGNERS</text>
      </g>
      <g transform="rotate(144)">
        <line x1="60" y1="0" x2="120" y2="0" stroke="#FBF850" stroke-width="1" opacity="0.3" />
        <rect x="120" y="-15" width="100" height="30" rx="15" fill="#111111" stroke="#FBF850" stroke-width="1" />
        <text x="170" y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" transform="rotate(-144, 170, 0)">QA</text>
      </g>
      <g transform="rotate(216)">
        <line x1="60" y1="0" x2="120" y2="0" stroke="#FBF850" stroke-width="1" opacity="0.3" />
        <rect x="120" y="-15" width="100" height="30" rx="15" fill="#111111" stroke="#FBF850" stroke-width="1" />
        <text x="170" y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" transform="rotate(-216, 170, 0)">DEVS</text>
      </g>
      <g transform="rotate(288)">
        <line x1="60" y1="0" x2="120" y2="0" stroke="#FBF850" stroke-width="1" opacity="0.3" />
        <rect x="120" y="-15" width="100" height="30" rx="15" fill="#111111" stroke="#FBF850" stroke-width="1" />
        <text x="170" y="5" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle" transform="rotate(-288, 170, 0)">DEVOPS</text>
      </g>
    </g>
  </g>
  
  <!-- Bottom Accent -->
  <rect y="620" width="1200" height="10" fill="#FBF850"/>
</svg>

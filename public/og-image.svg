<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background with dark gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Abstract UI Elements (Mocking the Home Page) -->
  <g opacity="0.15">
    <rect x="50" y="50" width="1100" height="530" rx="20" stroke="#FBF850" stroke-width="2" fill="none"/>
    <line x1="50" y1="120" x2="1150" y2="120" stroke="#FBF850" stroke-width="1"/>
    <circle cx="100" cy="85" r="8" fill="#FBF850"/>
    <circle cx="130" cy="85" r="8" fill="#FBF850"/>
    <circle cx="160" cy="85" r="8" fill="#FBF850"/>
  </g>

  <!-- Central Content -->
  <g transform="translate(600, 315)">
    <!-- Glow behind logo -->
    <circle r="120" fill="#FBF850" opacity="0.05" filter="url(#glow)"/>
    
    <text y="-40" font-family="system-ui, -apple-system, sans-serif" font-size="140" font-weight="900" fill="#FBF850" text-anchor="middle" letter-spacing="-5">WAMI</text>
    <text y="60" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="600" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" opacity="0.9">VIBE CODING</text>
    
    <!-- Senior Support Badge -->
    <g transform="translate(0, 140)">
      <rect x="-180" y="-25" width="360" height="50" rx="25" fill="#FBF850" fill-opacity="0.1" stroke="#FBF850" stroke-width="1"/>
      <text y="8" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#FBF850" text-anchor="middle" text-transform="uppercase" letter-spacing="2">Senior Oversight Included</text>
    </g>
  </g>

  <!-- Bottom Accents -->
  <rect x="0" y="620" width="1200" height="10" fill="#FBF850"/>
  
  <!-- Corner Accents -->
  <path d="M50 50 L100 50 M50 50 L50 100" stroke="#FBF850" stroke-width="4" fill="none"/>
  <path d="M1150 50 L1100 50 M1150 50 L1150 100" stroke="#FBF850" stroke-width="4" fill="none"/>
  <path d="M50 580 L100 580 M50 580 L50 530" stroke="#FBF850" stroke-width="4" fill="none"/>
  <path d="M1150 580 L1100 580 M1150 580 L1150 530" stroke="#FBF850" stroke-width="4" fill="none"/>
</svg>
